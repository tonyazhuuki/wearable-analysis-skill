- id: STRESS_006
  domain: stress
  hypothesis: "Chronic elevated stress (sustained >30 days) raises resting heart rate baseline independently of training load changes"
  source: "Vrijkotte 2000 Psychosomatic Medicine; Thayer 2012 Neuroscience & Biobehavioral Reviews"
  prediction: "30-day rolling stress average positively correlates with 30-day rolling RHR; 1-3 bpm RHR elevation during chronically stressed periods"
  test_type: correlation
  test_spec: "correlation(stress_30d_rolling, rhr_30d_rolling, method='pearson') AND detrend_for_training_volume(rhr_30d ~ stress_30d + training_volume_30d)"
  variables: [stress_30d_rolling, rhr_30d_rolling, training_volume_30d]
  population_effect: "Chronic work stress associated with 2-4 bpm higher RHR (Vrijkotte 2000, N=109 white-collar workers); effect persists after controlling for physical activity"
  actionable: true
  action_if_confirmed: "Rising RHR trend without training load change signals chronic stress accumulation; intervention needed at lifestyle level (workload, boundaries, recovery practices)"
  action_if_refuted: "RHR is primarily driven by training adaptations; stress does not meaningfully shift resting autonomic tone in this individual"
  priority: medium
  consensus_ref:
    - id: "recovery_hrv"
      finding: "RHR decomposition: non-iron mechanisms +0.5-2.0 bpm (stress is one); 40-50% overlap with iron pathway"
      grade: "B"
      path: "health/automated_reviews/2026_02_recovery_hrv_consensus/consensus_reference.md"
    - id: "stress_mgmt"
      finding: "Burnout staging (McEwen Stage 1-3); chronic stress -> allostatic overload -> RHR elevation; fast recovery phenotype exists"
      grade: "B"
      path: "health/automated_reviews/2026_02_stress_management_consensus/consensus_reference.md"
    - id: "whoop_deep"
      finding: "N=1 example: HRV decline fully mediated by RHR; RHR identified as bottleneck"
      grade: "N=1"
      path: "health/automated_reviews/2026_02_whoop_deep_analysis/synthesis.md"
