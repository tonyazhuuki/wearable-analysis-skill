# Interaction Hypotheses — Pre-registered for N=1 Wearable Data Analysis
# Generated: 2026-02-12
# Updated: 2026-03-20 (cleaned for external sharing — personal data removed)
# Domain: Multi-variable interactions, mediation chains, compound effects
# Sources: Synthesized from multiple peer-reviewed domains (sleep, stress, exercise, iron metabolism)
# Consensus coverage: Recovery & HRV, Sleep, Stress Management, Training Polarization,
#   Exercise Outcomes, Menstrual Cycle × Wearable Metrics, Caffeine, Respiratory Rate,
