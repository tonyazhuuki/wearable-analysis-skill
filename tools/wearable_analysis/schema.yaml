        whoop_keys: ["Activity Name"]
        type: str
        required: true
        aliases: [activity, workout_name]
        description: "Name of the activity"

      - internal: activity_strain
        whoop_keys: ["Activity Strain"]
        type: float
        unit: "strain"
        range: [0, 21]
        required: false
