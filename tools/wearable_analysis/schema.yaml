# WHOOP Data Schema Registry — Single Source of Truth
# Every WHOOP field → internal column name, type, unit, aliases
# Used by: ingest.py, hypothesis_test.py, eda.py, personalize.py
#
# Convention:
#   whoop_keys: exact field names as they appear in WHOOP MCP JSON (try in order)
#   internal: our standardized column name
#   aliases: names that hypothesis YAMLs or other code might use
#   type: float | int | str | pct (percentage 0-100) | duration (hours) | datetime
#   required: true = error if missing, false = warning
#   source: which JSON file this comes from

# ============================================================
# Recovery.json (576 records, daily)
# ============================================================
sources:
  Recovery.json:
    date_key: "Recovery Date"
    description: "Daily recovery metrics measured during sleep"
    fields:
      - internal: recovery
        whoop_keys: ["Recovery %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: true
        aliases: [recovery_score, recovery_pct]
        description: "Recovery score 0-100%"

      - internal: hrv
        whoop_keys: ["HRV (ms)"]
        type: float
        unit: "ms"
        range: [0, 350]
        required: true
        aliases: [hrv_rmssd, hrv_rmssd_nocturnal, heart_rate_variability]
        description: "Heart rate variability rMSSD during sleep"

      - internal: rhr
        whoop_keys: ["Resting Heart Rate (bpm)"]
        type: float
        unit: "bpm"
        range: [30, 120]
        required: true
        aliases: [resting_heart_rate, rhr_bpm]
        description: "Resting heart rate measured during deep sleep"

      - internal: resp_rate
        whoop_keys: ["Respiratory Rate (rpm)"]
        type: float
        unit: "rpm"
        range: [8, 30]
        required: false
        aliases: [respiratory_rate, breathing_rate]
        description: "Respiratory rate during sleep"

      - internal: spo2
        whoop_keys: ["Blood Oxygen (SpO₂)"]
        type: pct
        unit: "%"
        range: [80, 100]
        required: false
        aliases: [blood_oxygen, spo2_pct]
        description: "Blood oxygen saturation"

      - internal: skin_temp
        whoop_keys: ["Skin Temp (°C)"]
        type: float
        unit: "°C"
        range: [30, 40]
        required: false
        aliases: [skin_temperature, skin_temp_celsius]
        description: "Skin temperature during sleep"

      - internal: skin_temp_deviation
        whoop_keys: ["Skin Temp Deviation (°C)"]
        type: float
        unit: "°C"
        range: [-5, 5]
        required: false
        aliases: [temp_deviation]
        description: "Deviation from personal skin temp baseline"

      - internal: sleep_perf_recovery
        whoop_keys: ["Sleep Performance %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Sleep performance as reported in recovery context"

  # ============================================================
  # Sleep.json (573 records, daily)
  # ============================================================
  Sleep.json:
    date_key: "Sleep Start Date"
    description: "Nightly sleep metrics"
    fields:
      - internal: sleep_perf
        whoop_keys: ["Sleep Performance %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: true
        aliases: [sleep_performance]
        description: "Overall sleep performance score"

      - internal: sleep_hours
        whoop_keys: ["Hours of Sleep"]
        type: duration
        unit: "hours"
        range: [0, 16]
        required: true
        aliases: [total_sleep, sleep_duration, hours_of_sleep]
        description: "Total sleep duration"

      - internal: sleep_consistency
        whoop_keys: ["Sleep Consistency %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: true
        aliases: [consistency]
        description: "Sleep schedule consistency"

      - internal: sleep_efficiency
        whoop_keys: ["Sleep Efficiency %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: true
        aliases: [efficiency, sleep_eff]
        description: "Percentage of time in bed actually asleep"

      - internal: in_bed_hrs
        whoop_keys: ["Time in Bed"]
        type: duration
        unit: "hours"
        range: [0, 16]
        required: false
        aliases: [time_in_bed]
        description: "Total time in bed"

      - internal: deep_hrs
        whoop_keys: ["Deep Sleep (SWS)"]
        type: duration
        unit: "hours"
        range: [0, 6]
        required: true
        aliases: [deep_sleep, deep_sws]
        description: "Deep / slow-wave sleep duration"

      - internal: rem_hrs
        whoop_keys: ["REM Sleep"]
        type: duration
        unit: "hours"
        range: [0, 6]
        required: true
        aliases: [rem_sleep, rem]
        description: "REM sleep duration"

      - internal: light_hrs
        whoop_keys: ["Light Sleep"]
        type: duration
        unit: "hours"
        range: [0, 10]
        required: false
        aliases: [light_sleep, light]
        description: "Light sleep duration"

      - internal: awake_time_hrs
        whoop_keys: ["Awake Time"]
        type: duration
        unit: "hours"
        range: [0, 4]
        required: false
        aliases: [awake_time, awake]
        description: "Time awake during sleep period"

      - internal: restorative_hrs
        whoop_keys: ["Restorative Sleep (hrs)"]
        type: duration
        unit: "hours"
        range: [0, 10]
        required: false
        aliases: [restorative_sleep]
        description: "Deep + REM combined"

      - internal: sleep_needed_hrs
        whoop_keys: ["Sleep Needed (Total)"]
        type: duration
        unit: "hours"
        range: [4, 14]
        required: false
        aliases: [sleep_needed, sleep_need]
        description: "WHOOP-recommended sleep need"

      - internal: wake_events
        whoop_keys: ["Wake Events"]
        type: int
        unit: "count"
        range: [0, 50]
        required: false
        aliases: [wake_count, awakenings]
        description: "Number of wake events (micro-arousals)"

      - internal: sleep_debt_added
        whoop_keys: ["Sleep Debt (Added)"]
        type: duration
        unit: "hours"
        range: [-5, 5]
        required: false
        aliases: [debt_added]
        description: "Sleep debt added this night"

      - internal: sleep_debt_hrs
        whoop_keys: ["Sleep Debt (After Today)"]
        type: duration
        unit: "hours"
        range: [0, 20]
        required: false
        aliases: [sleep_debt, debt_total]
        description: "Cumulative sleep debt"

      - internal: bed_time_raw
        whoop_keys: ["Bed Time"]
        type: str
        unit: "time"
        required: false
        aliases: [bedtime_raw]
        description: "Bedtime as string (needs parsing to hour)"

      - internal: wake_time_raw
        whoop_keys: ["Wake Time"]
        type: str
        unit: "time"
        required: false
        aliases: [waketime_raw]
        description: "Wake time as string"

      - internal: sleep_hr_avg
        whoop_keys: ["Avg HR (bpm)"]
        type: float
        unit: "bpm"
        range: [30, 120]
        required: false
        aliases: [sleep_avg_hr]
        description: "Average HR during sleep (NOT resting HR)"

      - internal: sleep_hr_min
        whoop_keys: ["Min HR (bpm)"]
        type: float
        unit: "bpm"
        range: [25, 100]
        required: false
        aliases: [sleep_min_hr]
        description: "Minimum HR during sleep"

      - internal: sleep_hr_max
        whoop_keys: ["Max HR (bpm)"]
        type: float
        unit: "bpm"
        range: [40, 200]
        required: false
        aliases: [sleep_max_hr]
        description: "Maximum HR during sleep"

      - internal: sleep_stress_pct
        whoop_keys: ["Sleep Stress %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: [sleep_stress]
        description: "Percentage of sleep under stress"

      - internal: deep_pct_raw
        whoop_keys: ["Deep %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: [deep_pct_raw]
        description: "Deep sleep percentage (raw from WHOOP)"

      - internal: rem_pct_raw
        whoop_keys: ["REM %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: [rem_pct_raw]
        description: "REM sleep percentage (raw from WHOOP)"

      - internal: light_pct_raw
        whoop_keys: ["Light %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: [light_pct_raw]
        description: "Light sleep percentage (raw from WHOOP)"

      - internal: awake_pct
        whoop_keys: ["Awake %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Awake percentage"

      - internal: hours_vs_needed
        whoop_keys: ["Hours vs Needed %"]
        type: pct
        unit: "%"
        range: [0, 200]
        required: false
        aliases: [hours_vs_needed_pct]
        description: "Sleep hours as percentage of need"

      - internal: restorative_pct
        whoop_keys: ["Restorative Sleep %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: [restorative_sleep_pct]
        description: "Restorative (Deep+REM) as percentage"

      - internal: sleep_stress_high_hrs
        whoop_keys: ["Sleep Stress (High)"]
        type: duration
        unit: "hours"
        range: [0, 12]
        required: false
        aliases: [sleep_stress_high]
        description: "Hours of high stress during sleep"

      - internal: sleep_stress_med_hrs
        whoop_keys: ["Sleep Stress (Medium)"]
        type: duration
        unit: "hours"
        range: [0, 12]
        required: false
        aliases: [sleep_stress_medium]
        description: "Hours of medium stress during sleep"

      - internal: sleep_stress_low_hrs
        whoop_keys: ["Sleep Stress (Low)"]
        type: duration
        unit: "hours"
        range: [0, 12]
        required: false
        aliases: [sleep_stress_low]
        description: "Hours of low stress during sleep"

      - internal: recent_strain
        whoop_keys: ["Recent Strain"]
        type: float
        unit: "strain"
        range: [0, 25]
        required: false
        aliases: [recent_strain_val]
        description: "Recent strain impacting sleep"

      - internal: optimal_bedtime_raw
        whoop_keys: ["Optimal Bedtime"]
        type: str
        unit: "time"
        required: false
        aliases: [optimal_bedtime]
        description: "WHOOP-recommended bedtime"

      - internal: optimal_waketime_raw
        whoop_keys: ["Optimal Waketime"]
        type: str
        unit: "time"
        required: false
        aliases: [optimal_waketime]
        description: "WHOOP-recommended wake time"

      - internal: healthy_minimum_hrs
        whoop_keys: ["Healthy Minimum"]
        type: duration
        unit: "hours"
        range: [4, 12]
        required: false
        aliases: [healthy_minimum]
        description: "Minimum healthy sleep duration"

