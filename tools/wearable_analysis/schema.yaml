        unit: "strain"
        range: [0, 21]
        required: true
        aliases: [day_strain, daily_strain]
        description: "Overall daily strain score"

      - internal: steps
        whoop_keys: ["Steps"]
        type: int
        unit: "steps"
        range: [0, 50000]
        required: true
        aliases: [daily_steps, step_count]
        description: "Daily step count"

      - internal: calories
        whoop_keys: ["Calories"]
        type: float
        unit: "kcal"
        range: [0, 10000]
        required: false
        aliases: [daily_calories, calories_burned]
        description: "Total calories burned"

      - internal: hr_zones_13_hrs
        whoop_keys: ["HR Zones 1-3 (time)"]
        type: duration
        unit: "hours"
        range: [0, 24]
        required: false
        aliases: [hr_zones_low, zones_13, low_intensity_hrs]
        description: "Time in HR zones 1-3 (low-moderate intensity)"

      - internal: hr_zones_45_hrs
        whoop_keys: ["HR Zones 4-5 (time)"]
        type: duration
        unit: "hours"
        range: [0, 6]
        required: false
        aliases: [hr_zones_high, zones_45, high_intensity_hrs]
        description: "Time in HR zones 4-5 (high intensity)"

      - internal: strength_time_hrs
        whoop_keys: ["Strength Activity Time"]
        type: duration
        unit: "hours"
        range: [0, 6]
        required: false
        aliases: [strength_time, strength_hrs]
        description: "Time in strength activities"

  # ============================================================
  # VO2_Max.json (541 records, daily)
  # ============================================================
  VO2_Max.json:
    date_key: "Date"
    description: "Estimated VO2max"
    fields:
      - internal: vo2max
        whoop_keys: ["VO2 Max (ml/kg/min)"]
        type: float
        unit: "ml/kg/min"
        range: [15, 80]
        required: true
        aliases: [vo2_max, cardio_fitness]
        description: "Estimated VO2max"

  # ============================================================
  # Total_Day_Stress.json (581 records, daily)
  # ============================================================
  Total_Day_Stress.json:
    date_key: "Date"
    description: "Daily stress totals by level"
    fields:
      - internal: stress_high_min
        whoop_keys: ["High Stress Duration"]
        type: duration
        unit: "minutes"
        range: [0, 1440]
        required: false
        aliases: [high_stress, stress_high]
        description: "Minutes of high stress"

      - internal: stress_med_min
        whoop_keys: ["Medium Stress Duration"]
        type: duration
        unit: "minutes"
        range: [0, 1440]
        required: false
        aliases: [medium_stress, stress_medium]
        description: "Minutes of medium stress"

      - internal: stress_low_min
        whoop_keys: ["Low Stress Duration"]
        type: duration
        unit: "minutes"
        range: [0, 1440]
        required: false
        aliases: [low_stress, stress_low]
        description: "Minutes of low stress"

  # ============================================================
  # Healthspan.json (47 records, weekly)
  # ============================================================
  Healthspan.json:
    date_key: "Week Start Date"
    description: "Weekly healthspan metrics and component impacts"
    frequency: weekly
    fields:
      - internal: healthspan_age
        whoop_keys: ["Healthspan Age"]
        type: float
        unit: "years"
        range: [15, 100]
        required: false
        aliases: [health_age]
        description: "Biological age estimate"

      - internal: pace_of_aging
        whoop_keys: ["Pace of Aging"]
        type: float
        unit: "ratio"
        range: [0, 3]
        required: false
        aliases: [aging_pace]
        description: "Rate of aging (1.0 = normal)"

      - internal: years_older_younger
        whoop_keys: ["Years Older/Younger"]
        type: float
        unit: "years"
        range: [-20, 20]
        required: false
        aliases: [age_delta]
        description: "Years older/younger than chronological"

      - internal: hs_sleep_consistency_impact
        whoop_keys: ["Sleep Consistency Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "Sleep consistency impact on healthspan"

      - internal: hs_sleep_hours_impact
        whoop_keys: ["Hours of Sleep Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "Sleep hours impact on healthspan"

      - internal: hs_zones13_impact
        whoop_keys: ["HR Zones 1-3 Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "Low-moderate activity impact on healthspan"

      - internal: hs_zones45_impact
        whoop_keys: ["HR Zones 4-5 Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "High intensity impact on healthspan"

      - internal: hs_strength_impact
        whoop_keys: ["Strength Activity Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "Strength training impact on healthspan"

      - internal: hs_steps_impact
        whoop_keys: ["Steps Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "Daily steps impact on healthspan"

      - internal: hs_vo2max_impact
        whoop_keys: ["VO₂ Max Impact", "VO2 Max Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: [vo2max_impact]
        description: "VO2max impact on healthspan"

      - internal: hs_rhr_impact
        whoop_keys: ["RHR Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: [rhr_impact]
        description: "RHR impact on healthspan"

      - internal: hs_lean_mass_impact
        whoop_keys: ["Lean Body Mass Impact"]
        type: years_impact
        unit: "years"
        range: [-5, 5]
        required: false
        aliases: []
        description: "Lean body mass impact on healthspan"

      - internal: hs_vo2max_30d
        whoop_keys: ["VO₂ Max 30d", "VO2 Max 30d"]
        type: float
        unit: "ml/kg/min"
        range: [15, 80]
        required: false
