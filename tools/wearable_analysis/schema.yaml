      - internal: hs_zones13_weekly_30d
        whoop_keys: ["HR Zones 1-3 Weekly 30d"]
        type: duration
        unit: "hours"
        range: [0, 50]
        required: false
        aliases: []
        description: "30-day average weekly zones 1-3 time"

      - internal: hs_zones45_weekly_30d
        whoop_keys: ["HR Zones 4-5 Weekly 30d"]
        type: duration
        unit: "hours"
        range: [0, 20]
        required: false
        aliases: []
        description: "30-day average weekly zones 4-5 time"

      - internal: hs_vo2max_6mo
        whoop_keys: ["VO₂ Max 6mo", "VO2 Max 6mo"]
        type: float
        unit: "ml/kg/min"
        range: [15, 80]
        required: false
        aliases: []
        description: "6-month VO2max average"

      - internal: hs_rhr_6mo
        whoop_keys: ["RHR 6mo (bpm)"]
        type: float
        unit: "bpm"
        range: [30, 120]
        required: false
        aliases: []
        description: "6-month RHR average"

      - internal: hs_sleep_consistency_30d
        whoop_keys: ["Sleep Consistency 30d (%)"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "30-day sleep consistency"

      - internal: hs_sleep_hours_30d
        whoop_keys: ["Hours of Sleep 30d"]
        type: duration
        unit: "hours"
        range: [0, 16]
        required: false
        aliases: []
        description: "30-day sleep hours average"

  # ============================================================
  # Strain_Activities.json (277 records, per-activity)
