        description: "Time in HR zone 2"

      - internal: zone3_min
        whoop_keys: ["Zone 3"]
        type: duration
        unit: "minutes"
        range: [0, 600]
        required: false
        aliases: [z3_min]
        description: "Time in HR zone 3"

      - internal: zone4_min
        whoop_keys: ["Zone 4"]
        type: duration
        unit: "minutes"
        range: [0, 600]
        required: false
        aliases: [z4_min]
        description: "Time in HR zone 4"

      - internal: zone5_min
        whoop_keys: ["Zone 5"]
        type: duration
        unit: "minutes"
        range: [0, 600]
        required: false
        aliases: [z5_min]
        description: "Time in HR zone 5"

  # ============================================================
  # Health_Monitor.json (24 records, daily — limited history)
  # ============================================================
  Health_Monitor.json:
    date_key: "Date"
    description: "Health monitor readings (fills gaps in Recovery)"
    fields:
      - internal: skin_temp_baseline
        whoop_keys: ["Skin Temp Baseline (°C)"]
        type: float
        unit: "°C"
        range: [30, 40]
        required: false
        aliases: [temp_baseline]
        description: "Skin temperature baseline"

      - internal: skin_temp_hm
        whoop_keys: ["Skin Temp (°C)"]
        type: float
        unit: "°C"
        range: [30, 40]
        required: false
        aliases: []
        merge_into: skin_temp
        description: "Skin temp (Health Monitor source, merges into skin_temp)"

      - internal: skin_temp_deviation_hm
        whoop_keys: ["Skin Temp Deviation (°C)"]
        type: float
        unit: "°C"
        range: [-5, 5]
        required: false
        aliases: []
        merge_into: skin_temp_deviation
        description: "Skin temp deviation (Health Monitor source)"

      - internal: spo2_hm
        whoop_keys: ["Blood Oxygen (SpO₂)"]
        type: pct
        unit: "%"
        range: [80, 100]
        required: false
        aliases: []
        merge_into: spo2
        description: "SpO2 (Health Monitor source)"

      - internal: rhr_hm
        whoop_keys: ["RHR (bpm)"]
        type: float
        unit: "bpm"
        range: [30, 120]
        required: false
        aliases: []
        merge_into: rhr
        description: "RHR (Health Monitor source, fills gaps)"

      - internal: hrv_hm
        whoop_keys: ["HRV (ms)"]
        type: float
        unit: "ms"
        range: [0, 350]
        required: false
        aliases: []
        merge_into: hrv
        description: "HRV (Health Monitor source, fills gaps)"

      - internal: resp_rate_hm
        whoop_keys: ["Respiratory Rate (rpm)"]
        type: float
        unit: "rpm"
        range: [8, 30]
        required: false
        aliases: []
        merge_into: resp_rate
        description: "Respiratory rate (Health Monitor source)"

  # ============================================================
  # Naps.json (19 records, per-nap)
  # ============================================================
  Naps.json:
    date_key: "Nap Date"
    description: "Nap sessions with sleep stages"
    frequency: per_nap
    fields:
      - internal: nap_hours
        whoop_keys: ["Hours of Sleep"]
        type: duration
        unit: "hours"
        range: [0, 4]
        required: false
        aliases: [nap_duration]
        description: "Nap sleep duration"

      - internal: nap_efficiency
        whoop_keys: ["Efficiency %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Nap sleep efficiency"

      - internal: nap_deep_pct
        whoop_keys: ["Deep %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Nap deep sleep percentage"

      - internal: nap_rem_pct
        whoop_keys: ["REM %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Nap REM percentage"

      - internal: nap_restorative_pct
        whoop_keys: ["Restorative Sleep %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Nap restorative percentage"

      - internal: nap_wake_events
        whoop_keys: ["Wake Events"]
        type: int
        unit: "count"
        range: [0, 20]
        required: false
        aliases: []
        description: "Wake events during nap"

      - internal: nap_resp_rate
        whoop_keys: ["Respiratory Rate"]
        type: float
        unit: "rpm"
        range: [8, 30]
        required: false
        aliases: []
        description: "Respiratory rate during nap"

  # ============================================================
  # Recovery_Impact.json (22 records, per-factor)
  # ============================================================
  Recovery_Impact.json:
    date_key: "Date"
    description: "WHOOP-identified factors impacting recovery"
    frequency: per_factor
    fields:
      - internal: impact_activity
        whoop_keys: ["Activity/Behavior"]
        type: str
        required: false
        aliases: []
        description: "Activity or behavior name"

      - internal: impact_pct
        whoop_keys: ["Impact %"]
        type: pct
        unit: "%"
        range: [-100, 100]
        required: false
        aliases: []
        description: "Impact on recovery (%)"

  # ============================================================
  # Recovery_Activities.json (13 records, per-activity)
  # ============================================================
  Recovery_Activities.json:
    date_key: "Activity Date"
    description: "Recovery-specific activities (e.g., meditation)"
    frequency: per_activity
    fields:
      - internal: recovery_activity_name
        whoop_keys: ["Activity Name"]
        type: str
        required: false
        aliases: []
        description: "Recovery activity name"

      - internal: recovery_activity_duration
        whoop_keys: ["Duration"]
        type: duration
        unit: "minutes"
        range: [0, 300]
        required: false
        aliases: []
        description: "Recovery activity duration"

      - internal: recovery_activity_stress_change
        whoop_keys: ["Stress Change"]
        type: float
        unit: "delta"
        range: [-100, 100]
        required: false
        aliases: []
        description: "Stress change from recovery activity"

  # ============================================================
  # Stress_Monitor.json (24 records, per-interval — 30min)
  # ============================================================
  Stress_Monitor.json:
    date_key: "Date"
    description: "Intra-day stress at 30-min granularity"
    frequency: per_interval
    fields:
      - internal: stress_avg
        whoop_keys: ["Avg Stress"]
        type: float
        unit: "score"
        range: [0, 4]
        required: false
        aliases: [average_stress]
        description: "Average stress in interval"

      - internal: stress_max
        whoop_keys: ["Max Stress"]
        type: float
        unit: "score"
        range: [0, 4]
        required: false
        aliases: [max_stress, peak_stress]
        description: "Max stress in interval"

      - internal: stress_min
        whoop_keys: ["Min Stress"]
        type: float
        unit: "score"
        range: [0, 4]
        required: false
        aliases: [min_stress]
        description: "Min stress in interval"

  # ============================================================
  # Sleep_Timeline.json (24 records, per-stage)
  # ============================================================
  Sleep_Timeline.json:
    date_key: "Sleep Start Date"
    description: "Per-stage sleep timeline"
    frequency: per_stage
    fields:
      - internal: sleep_stage
        whoop_keys: ["Sleep Stage"]
        type: str
        required: false
        aliases: []
        description: "Sleep stage name (Wake, Light, Deep, REM)"

      - internal: stage_duration_min
        whoop_keys: ["Stage Duration (min)"]
        type: float
        unit: "minutes"
        range: [0, 600]
        required: false
        aliases: []
        description: "Duration of this stage"

  # ============================================================
  # Heart_Rate_Zones.json (2 records — zone definitions)
  # ============================================================
  Heart_Rate_Zones.json:
    date_key: "Date"
    description: "Personal HR zone boundary definitions"
    frequency: static
    fields:
      - internal: zone_name
        whoop_keys: ["Zone"]
        type: str
        required: false
        aliases: []
        description: "Zone name"

      - internal: zone_hr_min
        whoop_keys: ["HR Min (bpm)"]
        type: float
        unit: "bpm"
        range: [40, 230]
        required: false
        aliases: []
        description: "Zone lower HR boundary"

      - internal: zone_hr_max
        whoop_keys: ["HR Max (bpm)"]
        type: float
        unit: "bpm"
        range: [60, 230]
        required: false
        aliases: []
        description: "Zone upper HR boundary"

  # ============================================================
  # Weight.json (1 record)
  # ============================================================
  Weight.json:
    date_key: "Date"
    description: "Body composition"
    fields:
      - internal: weight_kg
        whoop_keys: ["Weight"]
        type: float
        unit: "kg"
        range: [30, 200]
        required: false
        aliases: [weight, body_weight]
        description: "Body weight"

      - internal: body_fat_pct
        whoop_keys: ["Body Fat (%)"]
        type: pct
        unit: "%"
        range: [5, 60]
        required: false
        aliases: [body_fat, fat_pct]
        description: "Body fat percentage"

      - internal: lean_mass_pct
        whoop_keys: ["Lean Body Mass (%)"]
        type: pct
        unit: "%"
        range: [40, 95]
        required: false
        aliases: [lean_mass, lean_pct]
        description: "Lean body mass percentage"

      - internal: lean_mass_kg
        whoop_keys: ["Lean Body Mass"]
        type: float
        unit: "kg"
        range: [20, 150]
        required: false
        aliases: []
        description: "Lean body mass absolute"

  # ============================================================
  # Strength_Training.json (5 records, per-workout)
  # ============================================================
  Strength_Training.json:
    date_key: "Activity Date"
    description: "Strength training sessions"
    frequency: per_workout
    fields:
      - internal: strength_workout_name
        whoop_keys: ["Workout"]
        type: str
        required: false
        aliases: []
        description: "Strength workout name"

      - internal: strength_total_reps
        whoop_keys: ["Total Reps"]
        type: int
        unit: "reps"
        range: [0, 1000]
        required: false
        aliases: []
        description: "Total reps in workout"

      - internal: strength_total_sets
        whoop_keys: ["Total Sets"]
        type: int
        unit: "sets"
        range: [0, 100]
        required: false
        aliases: []
        description: "Total sets in workout"

      - internal: strength_total_weight
        whoop_keys: ["Total Weight"]
        type: float
        unit: "kg"
        range: [0, 50000]
        required: false
        aliases: []
        description: "Total volume (weight)"

      - internal: strength_muscular_pct
        whoop_keys: ["Muscular %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Muscular load percentage"

      - internal: strength_cardio_pct
        whoop_keys: ["Cardio %"]
        type: pct
        unit: "%"
        range: [0, 100]
        required: false
        aliases: []
        description: "Cardio load percentage"

  # ============================================================
  # Physiological_Cycles.json (572 records)
  # ============================================================
  Physiological_Cycles.json:
    date_key: "Date"
    description: "Physiological cycle boundaries (for cycle-level analysis)"
    fields:
      - internal: cycle_id
        whoop_keys: ["Cycle ID"]
        type: str
        required: false
        aliases: []
        description: "Unique cycle identifier"

      - internal: cycle_start
        whoop_keys: ["Start Datetime"]
        type: datetime
        required: false
        aliases: []
        description: "Cycle start datetime"

      - internal: cycle_end
        whoop_keys: ["End Datetime"]
        type: datetime
        required: false
        aliases: []
        description: "Cycle end datetime"

  # ============================================================
  # Healthspan_Ranges.json (22 records, per-metric)
  # ============================================================
  Healthspan_Ranges.json:
    date_key: "Date"
    description: "Impact ranges for each healthspan metric"
    frequency: per_metric
    fields:
      - internal: hs_range_metric
        whoop_keys: ["Metric"]
        type: str
        required: false
        aliases: []
        description: "Healthspan metric name"

      - internal: hs_range_worst
        whoop_keys: ["Worst Impact"]
        type: float
        unit: "years"
        range: [-10, 0]
        required: false
        aliases: []
        description: "Worst possible impact"

      - internal: hs_range_best
        whoop_keys: ["Best Impact"]
        type: float
        unit: "years"
        range: [0, 10]
        required: false
        aliases: []
        description: "Best possible impact"

# ============================================================
# Derived columns (computed by add_derived_features)
# ============================================================
derived:
  # Sleep-derived
  - internal: deep_pct
    source: [deep_pct_raw, deep_hrs, sleep_hours]
    type: pct
    aliases: [deep_sleep_pct]
    description: "Deep sleep % (from raw or computed from hours)"

  - internal: rem_pct
    source: [rem_pct_raw, rem_hrs, sleep_hours]
    type: pct
    aliases: [rem_sleep_pct]
    description: "REM sleep % (from raw or computed from hours)"

  - internal: light_pct
    source: [light_pct_raw, light_hrs, sleep_hours]
    type: pct
    aliases: [light_sleep_pct]
    description: "Light sleep % (from raw or computed from hours)"

  - internal: bed_time_hour
    source: [bed_time_raw]
    type: float
    aliases: [bedtime_hour, bedtime_time, bedtime, bed_time_adj, bedtime_deviation]
    description: "Bedtime as decimal hour (0-24, adjusted for midnight)"

  - internal: wake_time_hour
    source: [wake_time_raw]
    type: float
    aliases: [wake_time, waketime_hour]
    description: "Wake time as decimal hour"

  - internal: stress_high_pct
    source: [stress_high_min, stress_med_min, stress_low_min]
    type: pct
    aliases: [stress_daily, stress_level, stress_pct]
    description: "High stress as percentage of total stress time"

  # Rolling averages (7d, 14d, 30d)
  - internal: "{col}_{window}"
    source: "any numeric column"
    type: float
    pattern: true
    windows: [7, 14, 30]
    aliases_pattern: ["{col}_{window}d_rolling", "{col}_{window}d_avg"]
    description: "Rolling average of {col} over {window} days"

  # Lag features (prev_1d, prev_2d, prev_3d)
  - internal: "prev_{lag}d_{col}"
    source: "any numeric column"
    type: float
    pattern: true
    lags: [1, 2, 3]
    description: "Value of {col} {lag} days ago"

  # Zone percentages (from activity zones)
  - internal: "zone{n}_pct"
    source: "zone{n}_min"
    type: pct
    pattern: true
    aliases_pattern: ["z{n}_pct"]
    description: "Zone {n} as percentage of total zone time"

  # Weekly aggregates
  - internal: z2_weekly
    source: [zone2_min]
    type: float
    unit: "minutes"
    aliases: [z2_minutes_weekly, zone2_minutes_weekly, moderate_activity_minutes_weekly]
    description: "Weekly Z2 training volume"

  # Activity aggregates (from Strain_Activities)
  - internal: is_game_sport_day
    source: [activity_name]
    type: int
    aliases: [activity_type, game_sport, is_game_day]
    description: "1 if any activity is a game sport (soccer, padel, tennis, etc.)"

  - internal: dominant_activity
    source: [activity_name]
    type: str
    aliases: [dominant_sport, main_activity]
    description: "Most common activity on that day"

  - internal: n_activities
    source: [activity_name]
    type: int
    aliases: [n_activities_day, activity_count]
    description: "Number of activities on that day"

  - internal: total_activity_min
    source: [activity_duration_min]
    type: float
    unit: "minutes"
    aliases: [total_activity_minutes]
    description: "Total activity duration on that day"

  # Interaction terms
  - internal: hrv_rhr_ratio
    source: [hrv, rhr]
    type: float
    aliases: [hrv_rhr]
    description: "HRV / RHR ratio"

  - internal: sleep_perf_recovery
    source: [sleep_perf, recovery]
    type: float
    aliases: []
    description: "Sleep performance × Recovery interaction"

  - internal: deep_x_strain
    source: [deep_pct, strain]
    type: float
    aliases: []
    description: "Deep sleep % × Strain interaction"

  # Nap aggregates (from Naps)
  - internal: has_nap
    source: [nap_hours]
    type: int
    aliases: [napped]
    description: "1 if napped that day"

  - internal: nap_total_hrs
    source: [nap_hours]
    type: float
    unit: "hours"
    aliases: [nap_duration_total]
    description: "Total nap duration that day"

  # Time features (added by ingest)
  - internal: dow
    source: [date]
    type: int
    aliases: [day_of_week, dayofweek, weekday]
    description: "Day of week (0=Mon, 6=Sun)"

  - internal: month
    source: [date]
    type: int
    aliases: [month_num]
    description: "Month number (1-12)"

  # Lag aliases (prev_Xd_col from add_derived_features)
  - internal: prev_1d_strain
    source: [strain]
    type: float
    aliases: [strain_prev_day, strain_yesterday, yesterday_strain]
    description: "Previous day strain"

  - internal: prev_1d_recovery
    source: [recovery]
    type: float
    aliases: [recovery_prev_day, recovery_yesterday]
    description: "Previous day recovery"

# ============================================================
# Game sports classification
# ============================================================
game_sports:
  - Soccer
  - Padel
  - Tennis
  - Volleyball
  - Paddle Tennis
  - Badminton
  - Squash
  - Basketball
  - Football
  - Table Tennis
  - Pickleball
